  .hero svg{display:block;width:100%;height:auto}
  .banner{font-size:13px;padding:11px 16px;border-radius:10px;margin-bottom:8px;font-weight:600}
  .open{background:#e7f7ee;color:#1b8a54}
  .closed{background:#f0f1f3;color:#7b8088}
  .hint{background:#eef3ff;color:#2c53b0;font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:18px}
  /* 홈 타일 */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .tile{
    background:#fff;border-radius:16px;padding:22px 20px;min-height:128px;cursor:pointer;
    border-left:12px solid #cfd3d8;box-shadow:0 4px 10px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    transition:transform .12s ease, box-shadow .12s ease;-webkit-tap-highlight-color:rgba(0,0,0,.05);
  }
  .tile:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(0,0,0,.12)}
  .tile:active{transform:scale(.98)}
  .tile .em{font-size:30px;line-height:1}
  .tile .tn{font-weight:800;font-size:18px;margin:10px 0 4px}
  .tile .tc{color:#a0a4ab;font-size:12.5px}
  /* 카드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .card{
    background:#fff;border-radius:14px;padding:18px 20px;border-left:12px solid #cfd3d8;min-height:120px;
    box-shadow:0 4px 10px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    transition:transform .12s ease, box-shadow .12s ease;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(0,0,0,.12)}
  .card:active{transform:scale(.98)}
  .nm{font-weight:700;font-size:17px}
  .sd{color:#b3b7bd;font-size:12px;font-weight:400;margin-left:6px}
  .lb{font-weight:700;font-size:16px;margin:8px 0 6px}
  .eta{font-size:13px;color:#3a3f47;margin:0 0 8px;min-height:18px}
  .eta b{font-size:15px}
  .eta small{color:#a0a4ab;font-weight:400}
  .ad{color:#a0a4ab;font-size:12.5px;overflow-wrap:anywhere}
  .tap{font-size:13px;color:#3d7bfd;font-weight:600;margin:8px 0}
  .spin{font-size:13px;color:#f0a020;font-weight:600;margin:8px 0}
  /* 공항 주차장 로트 목록 */

  .lot{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px dashed #eceef1}
  .lot:last-child{border-bottom:0}
  .lot .ln{color:#3a3f47}
  .lot .lv{font-weight:700}
  .lot .lv small{color:#a0a4ab;font-weight:400}
  .chip{display:inline-block;min-width:44px;text-align:center;border-radius:6px;color:#fff;font-size:11px;font-weight:700;padding:2px 6px;margin-left:6px}
  /* 상단 바 (카테고리 화면) */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .back{background:#fff;border:0;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:700;color:#3d7bfd;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .cattitle{font-size:19px;font-weight:800}
  .catsub{color:#a0a4ab;font-size:12.5px;margin-left:2px}
  footer{color:#8a8f98;font-size:12px;margin-top:28px;line-height:1.6}

    .hint,.banner{font-size:12.5px}
  }

    {name:"삼성서울병원",sido:"서울",addr:"서울특별시 강남구 일원로 81",lat:37.4880},
    {name:"신촌세브란스",sido:"서울",addr:"서울특별시 서대문구 연세로 50-1",lat:37.5620},
    {name:"서울성모병원",sido:"서울",addr:"서울특별시 서초구 반포대로 222",lat:37.5010},
    {name:"분당서울대병원",sido:"경기",addr:"경기도 성남시 분당구 구미로173번길 82",lat:37.3520},
  ]},
};
const AIRPORTS = [
  {code:"ICN1",name:"인천공항 T1",addr:"인천광역시 중구 공항로 272"},
  {code:"ICN2",name:"인천공항 T2",addr:"인천광역시 중구 제2터미널대로 446"},
  {code:"GMP",name:"김포공항",addr:"서울특별시 강서구 하늘길 76"},
  {code:"CJU",name:"제주공항",addr:"제주특별자치도 제주시 공항로 2"},
  {code:"PUS",name:"김해공항",addr:"부산광역시 강서구 공항진입로 108"},
];
const TILES = [
  ["costco"],["traders"],["outlet"],["starfield"],["ikea"],["department"],
  ["themepark"],["waterpark"],["expo"],["stadium"],["hospital"],
  ["airport", {label:"공항 주차장", emoji:"✈️", accent:"#5a6cf0", count:AIRPORTS.length, sub:"잔여 대수 · 출국장 혼잡"}],
];

const STATE = {};   // "cat:name" -> 조회 결과
const ASTATE = {};  // 공항 code -> 조회 결과
const ESTATE = {};  // 전시장 venue -> 행사 정보 HTML

function cssId(n){ return encodeURIComponent(n).replace(/[%.]/g,'_'); }
function kstHour(){ return new Date(Date.now()+9*3600*1000).getUTCHours(); }
function h12(h){ return h<12 ? `오전 ${h}시` : (h===12 ? '낮 12시' : `오후 ${h-12}시`); }

return `<div class="hero"><svg viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">

// ── 홈 화면 ───────────────────────────────────────────────────────────
function renderHome(){
  const tiles = TILES.map(([key, ov])=>{
    const c = ov || CATS[key];
    const count = ov ? ov.count : c.stores.length;
    const sub = ov ? ov.sub : `${count}개 지점 · 진입로 혼잡도`;
    return `<div class="tile" style="border-left-color:${c.accent}" onclick="go('${key}')">
      <div class="em">${c.emoji}</div>
      <div class="tn">${c.label}</div>
      <div class="tc">${sub}</div>
    </div>`;
  }).join('');
  document.getElementById('app').innerHTML = heroSVG() +
    `<div class="hint">가려는 곳을 고르면, 지점별 <b>진입로 혼잡도</b>와 <b>예상 진입시간</b>(공항은 <b>잔여 주차 대수</b>)을 확인할 수 있어요.</div>
     <div class="tiles">${tiles}</div>`;
}

// ── 카테고리(매장) 화면 ────────────────────────────────────────────────
function renderCat(key){
  const c = CATS[key];
  const open = kstHour()>=c.hours[0] && kstHour()<c.hours[1];
  const ordered = [...c.stores].sort((a,b)=>b.lat-a.lat);
  const cards = ordered.map(s=>{
    const {color,inner} = cardHTML(key,s);
    return `<div class="card" id="card-${cssId(key+s.name)}" style="border-left-color:${color}" onclick="loadStore('${key}','${s.name.replace(/'/g,"\\'")}')">${inner}</div>`;
  }).join('');
  document.getElementById('app').innerHTML =
    `<div class="topbar"><button class="back" onclick="go('')">‹ 홈</button>
       <div><span class="cattitle">${c.emoji} ${c.label}</span><span class="catsub"> ${c.stores.length}개 지점</span></div></div>
     <div class="banner ${open?'open':'closed'}">${open
        ? `🟢 지금 조회 가능 · ${h12(c.hours[0])}~${h12(c.hours[1])}`
        : `⏳ 지금은 조회 시간이 아니에요 · ${h12(c.hours[0])}~${h12(c.hours[1])}에 확인하세요`}</div>
     ${c.note ? `<div class="banner" style="background:#fdf6e3;color:#8a6d1f">💡 ${c.note}</div>` : ''}
     <div class="hint">👆 카드를 <b>누르면</b> 지금 진입로 혼잡도와 예상 진입시간이 표시됩니다.</div>
     <div class="grid">${cards}</div>`;
  if(key==='expo') c.stores.forEach(s=>loadEvents(s.name));
}

async function loadEvents(name){
  if(ESTATE[name]!==undefined){ updateCard('expo', CATS.expo.stores.find(x=>x.name===name)); return; }
  let html='';
  try{
    const res = await fetch(`/.netlify/functions/events?venue=${encodeURIComponent(name)}`);
    const d = await res.json();
    if(d.count>0){
      const names = (d.events||[]).slice(0,2).map(e=>e.title).join(' · ');
      html = `<div style="font-size:12px;color:#c0392b;margin:2px 0 6px">📅 오늘 행사 <b>${d.count}건</b> — 혼잡 예상${names?`<br><span style="color:#a0a4ab">${names}${d.count>2?' 외':''}</span>`:''}</div>`;
    } else if(d.count===0){
      html = `<div style="font-size:12px;color:#1b8a54;margin:2px 0 6px">📅 오늘 행사 없음 — 한산 예상</div>`;
    } else {
      html = `<div style="font-size:11px;color:#c98500;margin:2px 0 6px">📅 행사 정보: ${d.reason==='no-key'?'공공데이터 키 등록 후 표시':'일시적 오류'}</div>`;
    }
  }catch(e){
    html = `<div style="font-size:11px;color:#c98500;margin:2px 0 6px">📅 행사 정보는 배포 후 표시됩니다</div>`;
  }
  ESTATE[name]=html;
  updateCard('expo', CATS.expo.stores.find(x=>x.name===name));
}

function zerotimeHTML(r,key){
  if(r && r.zerotime && r.zerotime.time){
    return `<div style="font-size:12px;color:#1b8a54;margin:2px 0 4px">🅾️ 예상 제로트래픽 <b>${r.zerotime.time}</b> 이후 <small style="color:#a0a4ab">(최근 4주 같은 요일·표본 ${r.zerotime.samples})</small></div>`;
  }
  if(r && !r.loading && !r.demo && (key==='costco'||key==='traders')){
    return `<div style="font-size:11px;color:#b3b7bd;margin:2px 0 4px">📊 제로트래픽 시간 학습 중</div>`;
  }
  return '';
}

function cardHTML(key,s){
  const r = STATE[key+':'+s.name];
  let color='#cfd3d8', line='<div class="tap">눌러서 혼잡도 확인 ›</div>';
  if(r && r.loading){ line='<div class="spin">확인 중…</div>'; }
  else if(r && r.closed){ line='<div class="lb" style="color:#9aa0a6">영업 종료</div>'+zerotimeHTML(r,key); }
  else if(r && r.error){ line='<div class="lb" style="color:#c98500">잠시 후 다시 눌러 주세요</div>'; }
  else if(r && r.congestion!=null && COLORS[r.congestion]){
    color = COLORS[r.congestion][0];
    const eta = r.eta_min!=null ? `예상 진입 <b>${r.eta_min}분</b> <small>(도로 ${r.road_min}분+대기 ${r.queue_min}분)</small>` : '';
    const note = r.demo ? `<div style="font-size:11px;color:#c98500;margin-top:2px">${r.reason==='local'?'※ 로컬 미리보기 — 넷리파이 배포 후 실시간 값이 표시됩니다':'※ 임시값 ('+(r.reason||'키 확인')+')'}</div>` : '';
    line = `<div class="lb" style="color:${color}">${r.label}</div><div class="eta">${eta}</div>${zerotimeHTML(r,key)}${note}`;
  }
  const ev = key==='expo' ? (ESTATE[s.name]!==undefined ? ESTATE[s.name] : '<div style="font-size:12px;color:#a0a4ab;margin:2px 0 6px">📅 행사 확인 중…</div>') : '';
  return {color, inner:`<div class="nm">${s.name}<span class="sd">${s.sido}</span></div>${ev}${line}<div class="ad">${s.addr}</div>`};
}

async function loadStore(key,name){
  const s = CATS[key].stores.find(x=>x.name===name);
  STATE[key+':'+name]={loading:true}; updateCard(key,s);
  let data;
  try{
    const res = await fetch(`/.netlify/functions/store?cat=${key}&name=${encodeURIComponent(name)}`);
    data = await res.json();
  }catch(e){
    const cong=[1,1,2,2,3][Math.floor(Math.random()*5)];
    const road=Math.round((0.4+cong*0.7)*10)/10; const q={0:1,1:1,2:7,3:15}[cong];
    data={congestion:cong,label:COLORS[cong][1],road_min:road,queue_min:q,eta_min:Math.round(road+q),demo:true,reason:'local'};
  }
  STATE[key+':'+name]=data; updateCard(key,s);
}
function updateCard(key,s){
  const el=document.getElementById('card-'+cssId(key+s.name));
  if(!el) return;
  const {color,inner}=cardHTML(key,s);
  el.style.borderLeftColor=color; el.innerHTML=inner;
}

// ── 공항 화면 ─────────────────────────────────────────────────────────
function renderAirport(){
  const cards = AIRPORTS.map(a=>{
    const {color,inner}=airportCardHTML(a);
    return `<div class="card" id="acard-${a.code}" style="border-left-color:${color}" onclick="loadAirport('${a.code}')">${inner}</div>`;
  }).join('');
  document.getElementById('app').innerHTML =
    `<div class="topbar"><button class="back" onclick="go('')">‹ 홈</button>
       <div><span class="cattitle">✈️ 공항 주차장</span><span class="catsub"> 층·구역별 잔여 대수</span></div></div>
     <div class="banner open">🟢 공항 주차장은 24시간 조회 가능</div>
     <div class="hint">👆 공항을 <b>누르면</b> 주차장 층·구역별 <b>남은 자리</b>가 표시됩니다.</div>
     <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">${cards}</div>`;
}
function airportCardHTML(a){
  const r = ASTATE[a.code];
  let color='#cfd3d8', line='<div class="tap">눌러서 잔여 대수 확인 ›</div>';
  if(r && r.loading){ line='<div class="spin">확인 중…</div>'; }
  else if(r && r.error){ line='<div class="lb" style="color:#c98500">잠시 후 다시 눌러 주세요</div>'; }
  else if(r && r.lots){
    const worst = r.lots.reduce((m,l)=> (l.remain!=null && (m==null||l.remain/(l.total||1) < m)) ? l.remain/(l.total||1) : m, null);
    color = worst==null ? '#cfd3d8' : worst<0.1 ? '#e74c3c' : worst<0.3 ? '#f1c40f' : '#2ecc71';
    const rows = r.lots.map(l=>{
      const val = l.remain!=null ? `<b>${l.remain.toLocaleString()}대</b> <small>/ ${ (l.total||0).toLocaleString() }면</small>` : '—';
      return `<div class="lot"><span class="ln">${l.lot}</span><span class="lv">${val}<span class="chip" style="background:${l.hex}">${l.label}</span></span></div>`;
    }).join('');
    const dep = r.dep ? `<div class="lot" style="border-top:1px solid #eceef1;margin-top:2px;padding-top:6px"><span class="ln">🛫 이 시간대 예상 출국객</span><span class="lv"><b>${r.dep.count.toLocaleString()}명</b><span class="chip" style="background:${r.dep.hex}">${r.dep.label}</span></span></div>` : '';
    const note = r.demo ? `<div style="font-size:11px;color:#c98500;margin-top:4px">${r.reason==='local'?'※ 로컬 미리보기 — 넷리파이 배포 후 실시간 값이 표시됩니다':'※ 임시값 ('+(r.reason||'공공데이터 키 등록 필요')+')'}</div>` : '';
    line = `<div class="lots">${rows}${dep}</div>${note}`;
  }
  return {color, inner:`<div class="nm">${a.name}</div>${line}<div class="ad">${a.addr}</div>`};
}
async function loadAirport(code){
  const a=AIRPORTS.find(x=>x.code===code);
  ASTATE[code]={loading:true}; updateAirportCard(a);
  let data;
  try{
    const res = await fetch(`/.netlify/functions/airport?code=${code}`);
    data = await res.json();
  }catch(e){ data={error:true}; }
  ASTATE[code]=data; updateAirportCard(a);
}
function updateAirportCard(a){
  const el=document.getElementById('acard-'+a.code);
  if(!el) return;
  const {color,inner}=airportCardHTML(a);
  el.style.borderLeftColor=color; el.innerHTML=inner;
}

// ── 라우팅 ────────────────────────────────────────────────────────────
function go(key){
  location.hash = key ? '#'+key : '';
  route();
  window.scrollTo(0,0);
}
function route(){
  const key = location.hash.replace('#','');
  if(key==='airport') renderAirport();
  else if(CATS[key]) renderCat(key);
  else renderHome();
}
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
